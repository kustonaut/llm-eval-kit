<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="250">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#131922"/>
    </linearGradient>
  </defs>
  <rect width="800" height="250" fill="url(#bg2)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" fill="#58a6ff" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700" letter-spacing="2">ARCHITECTURE</text>
  <!-- Input -->
  <rect x="30" y="55" width="120" height="55" rx="8" fill="#131922" stroke="#30363d"/>
  <text x="90" y="78" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700">LLM Output</text>
  <text x="90" y="96" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="9">text string</text>
  <!-- Arrow -->
  <line x1="150" y1="82" x2="180" y2="82" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#58a6ff"/></marker></defs>
  <!-- Tier 1 -->
  <rect x="185" y="45" width="230" height="75" rx="8" fill="rgba(63,185,80,0.06)" stroke="#3fb950" stroke-dasharray="4"/>
  <text x="300" y="65" text-anchor="middle" fill="#3fb950" font-family="Segoe UI,sans-serif" font-size="10" font-weight="700">TIER 1: RULE-BASED (0 DEPS)</text>
  <text x="300" y="82" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="9">Scorer + 10 Checks</text>
  <text x="300" y="98" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="8">hallucination · placeholder · style · PII</text>
  <text x="300" y="110" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="8">toxicity · JSON · completeness · consistency</text>
  <!-- Arrow -->
  <line x1="415" y1="82" x2="445" y2="82" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Tier 2 -->
  <rect x="450" y="45" width="170" height="75" rx="8" fill="rgba(188,140,255,0.06)" stroke="#bc8cff" stroke-dasharray="4"/>
  <text x="535" y="65" text-anchor="middle" fill="#bc8cff" font-family="Segoe UI,sans-serif" font-size="10" font-weight="700">TIER 2: LLM JUDGE</text>
  <text x="535" y="82" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="9">Bring Your Own Key</text>
  <text x="535" y="98" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="8">G-Eval · Pairwise · Rubric</text>
  <!-- Arrow -->
  <line x1="620" y1="82" x2="650" y2="82" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Output -->
  <rect x="655" y="45" width="120" height="75" rx="8" fill="#131922" stroke="#58a6ff"/>
  <text x="715" y="68" text-anchor="middle" fill="#58a6ff" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700">ScoreCard</text>
  <text x="715" y="85" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="9">0.0 - 1.0</text>
  <text x="715" y="102" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="9">PASS / FAIL</text>
  <!-- Bottom row -->
  <rect x="185" y="145" width="160" height="55" rx="8" fill="#131922" stroke="#30363d"/>
  <text x="265" y="168" text-anchor="middle" fill="#d29922" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700">Compare</text>
  <text x="265" y="186" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="9">N models · ranked table</text>
  <rect x="365" y="145" width="160" height="55" rx="8" fill="#131922" stroke="#30363d"/>
  <text x="445" y="168" text-anchor="middle" fill="#39d2c0" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700">Reports</text>
  <text x="445" y="186" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="9">HTML (Chart.js) · Markdown</text>
  <rect x="545" y="145" width="160" height="55" rx="8" fill="#131922" stroke="#30363d"/>
  <text x="625" y="168" text-anchor="middle" fill="#f0883e" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700">Eval Suites</text>
  <text x="625" y="186" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="9">YAML · regression · baselines</text>
  <!-- Footer -->
  <text x="400" y="230" text-anchor="middle" fill="#6e7e8e" font-family="Segoe UI,sans-serif" font-size="10">Zero deps for scoring · LLM judge opt-in · 43 tests · MIT</text>
</svg>
